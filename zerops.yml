zerops:
  - setup: app
    build:
      base: rust@stable
      prepareCommands:
        - rustup target add wasm32-unknown-unknown
        - cargo install dioxus-cli
      buildCommands:
        - dx build --release --platform web
      deployFiles:
        - target/dx/rust-web-tcg/release/web/public/
    run:
      base: static